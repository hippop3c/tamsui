<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雙北 YouBike 整點監測</title>
<style>
  :root {
    --bg: #0e1f2a;
    --bg-2: #14304a;
    --panel: rgba(255,255,255,0.06);
    --panel-strong: rgba(255,255,255,0.10);
    --panel-border: rgba(255,255,255,0.12);
    --ink: #f3f7fa;
    --ink-dim: #8fa6b5;
    --accent: #6fd3c8;
    --accent-2: #ffd166;
    --warn: #ef6f6c;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    min-height: 100vh;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(111,211,200,0.18), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(255,209,102,0.10), transparent 60%),
      linear-gradient(180deg, var(--bg), var(--bg-2));
    color: var(--ink);
    font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 32px 24px 80px; }

  header {
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 24px; flex-wrap: wrap;
    border-bottom: 1px solid var(--panel-border);
    padding-bottom: 18px; margin-bottom: 24px;
  }
  h1 {
    font-family: "Noto Serif TC", "PingFang TC", serif;
    font-weight: 700;
    font-size: clamp(22px, 3vw, 32px);
    margin: 0 0 6px;
    letter-spacing: 0.5px;
  }
  .sub { color: var(--ink-dim); font-size: 13px; letter-spacing: 0.5px; }
  .clock { text-align: right; font-variant-numeric: tabular-nums; }
  .clock .now { font-size: 26px; font-weight: 600; color: var(--accent); }
  .clock .next { font-size: 12px; color: var(--ink-dim); margin-top: 4px; }

  .topbar {
    display: flex; gap: 10px; align-items: center;
    margin-bottom: 22px; flex-wrap: wrap;
  }
  button {
    background: var(--accent); color: #0e1f2a;
    border: none; padding: 9px 16px;
    border-radius: 999px; font-weight: 600; font-size: 13px;
    cursor: pointer;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  button:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(111,211,200,0.25); }
  button.ghost {
    background: transparent; color: var(--ink);
    border: 1px solid var(--panel-border);
  }
  button.danger {
    background: transparent; color: var(--warn);
    border: 1px solid rgba(239,111,108,0.4);
  }
  button.icon-only {
    padding: 6px 10px; font-size: 12px;
  }
  .status { font-size: 13px; color: var(--ink-dim); }
  .status.ok { color: var(--accent); }
  .status.warn { color: var(--warn); }
  .sync {
    margin-left: auto;
    font-size: 12px;
    color: var(--ink-dim);
    transition: opacity .3s;
  }
  .sync.syncing { color: var(--accent-2); }
  .sync.ok { color: var(--accent); }
  .sync.warn { color: var(--warn); }

  /* ---------- 專案區塊 ---------- */
  .project {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 18px;
    padding: 22px;
    margin-bottom: 22px;
  }
  .project-header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; flex-wrap: wrap;
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--panel-border);
  }
  .project-title {
    font-family: "Noto Serif TC", serif;
    font-size: 19px; font-weight: 600;
    letter-spacing: 0.5px;
    flex: 1; min-width: 0;
  }
  .project-tools { display: flex; gap: 8px; flex-wrap: wrap; }

  /* 複製文字區 */
  .copybox {
    background: rgba(0,0,0,0.18);
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 14px;
    display: flex; gap: 12px; align-items: flex-start;
  }
  .copytext {
    flex: 1;
    font-family: "Menlo", "Consolas", "Noto Sans Mono CJK TC", monospace;
    font-size: 14px;
    line-height: 1.85;
    color: var(--ink);
    white-space: pre;
    overflow-x: auto;
    user-select: all;
    cursor: text;
  }
  .copy-btn {
    background: var(--accent); color: #0e1f2a;
    border: none; padding: 6px 14px;
    border-radius: 999px; font-weight: 600; font-size: 12px;
    cursor: pointer; white-space: nowrap;
  }
  .copy-btn.copied { background: var(--accent-2); }

  /* 站點卡片 */
  .stations {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
  }
  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    padding: 16px;
    position: relative;
  }
  .card .remove-btn {
    position: absolute; top: 8px; right: 8px;
    background: transparent; color: var(--ink-dim);
    border: none; padding: 4px 8px;
    font-size: 16px; cursor: pointer;
    border-radius: 6px;
    opacity: 0.5;
    transition: all .15s;
  }
  .card .remove-btn:hover { opacity: 1; color: var(--warn); background: rgba(239,111,108,0.1); }
  .card h3 {
    font-size: 15px; margin: 0 0 12px;
    font-weight: 600; padding-right: 24px;
  }
  .nums { display: flex; gap: 16px; align-items: baseline; }
  .num { display: flex; flex-direction: column; gap: 4px; }
  .num .v {
    font-size: 32px; font-weight: 700;
    font-variant-numeric: tabular-nums; line-height: 1;
    color: var(--ink);
  }
  .num .l { font-size: 11px; color: var(--ink-dim); letter-spacing: 1px; }
  .num.empty .v { color: var(--accent-2); }
  .bar {
    margin-top: 12px; height: 5px;
    background: rgba(255,255,255,0.08);
    border-radius: 999px; overflow: hidden;
  }
  .bar > span {
    display: block; height: 100%;
    background: linear-gradient(90deg, var(--accent), #b6f1ea);
    border-radius: 999px;
    transition: width .6s ease;
  }
  .meta {
    margin-top: 10px; font-size: 11px; color: var(--ink-dim);
    display: flex; justify-content: space-between;
  }

  .empty-card {
    text-align: center;
    padding: 28px 16px;
    color: var(--ink-dim);
    font-size: 13px;
    border: 1.5px dashed var(--panel-border);
    border-radius: 14px;
    background: transparent;
  }

  /* ---------- 對話框 ---------- */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center; justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: #1a2e3f;
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    padding: 24px;
    width: 100%; max-width: 520px;
    max-height: 85vh;
    overflow-y: auto;
  }
  .modal h2 {
    margin: 0 0 16px;
    font-family: "Noto Serif TC", serif;
    font-size: 19px;
  }
  .modal label {
    display: block;
    font-size: 12px; color: var(--ink-dim);
    margin: 12px 0 6px;
    letter-spacing: 0.5px;
  }
  .modal input[type="text"], .modal select {
    width: 100%;
    background: rgba(0,0,0,0.25);
    border: 1px solid var(--panel-border);
    color: var(--ink);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
  }
  .modal input[type="text"]:focus, .modal select:focus {
    outline: none;
    border-color: var(--accent);
  }
  .modal .row {
    display: flex; gap: 8px;
  }
  .modal .row > * { flex: 1; }

  .search-results {
    margin-top: 8px;
    max-height: 240px;
    overflow-y: auto;
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    background: rgba(0,0,0,0.2);
  }
  .search-results .item {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    cursor: pointer;
    font-size: 13px;
    transition: background .12s;
  }
  .search-results .item:hover { background: rgba(111,211,200,0.1); }
  .search-results .item:last-child { border-bottom: none; }
  .search-results .item .name { color: var(--ink); font-weight: 500; }
  .search-results .item .addr { color: var(--ink-dim); font-size: 11px; margin-top: 2px; }
  .search-results .empty { padding: 16px; text-align: center; color: var(--ink-dim); font-size: 13px; }

  .modal-actions {
    display: flex; gap: 10px; justify-content: flex-end;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--panel-border);
  }

  footer {
    margin-top: 36px;
    color: var(--ink-dim); font-size: 12px; line-height: 1.7;
  }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <h1>雙北 YouBike 整點監測</h1>
      <div class="sub">雙北涵蓋 ・ 多專案分組 ・ 每個整點自動更新</div>
    </div>
    <div class="clock">
      <div class="now" id="clockNow">--:--:--</div>
      <div class="next" id="clockNext">下次更新：--:--</div>
    </div>
  </header>

  <div class="topbar">
    <button id="addProjectBtn">＋ 新增專案</button>
    <button id="refreshBtn" class="ghost">↻ 立即更新車輛</button>
    <button id="reloadProjectsBtn" class="ghost">⟲ 重新載入雲端設定</button>
    <span class="status" id="status">準備中…</span>
    <span class="sync" id="syncStatus"></span>
  </div>

  <div id="projects"></div>

  <footer>
    所有專案設定**共用**：任何同事新增/編輯/刪除專案，會自動同步到雲端，其他人重新整理（或點「重新載入雲端設定」）就會看到。<br>
    車輛數每整點自動更新。資料來源：<a href="https://data.ntpc.gov.tw/datasets/71cd1490-a2df-4198-bef1-318479775e8a" target="_blank" rel="noopener">新北市 YouBike2.0</a>（透過 Cloudflare Worker 代理）、<a href="https://data.taipei/dataset/detail?id=c6bc8aed-557d-41d5-bfb1-8da24f78f2fb" target="_blank" rel="noopener">臺北市 YouBike2.0</a>。
  </footer>
</div>

<!-- 新增/重新命名 專案對話框 -->
<div class="modal-bg" id="projectModal">
  <div class="modal">
    <h2 id="projectModalTitle">新增專案</h2>
    <label>專案名稱</label>
    <input type="text" id="projectNameInput" placeholder="例：淡水組、八里組…">
    <div class="modal-actions">
      <button class="ghost" data-modal-close>取消</button>
      <button id="projectSaveBtn">儲存</button>
    </div>
  </div>
</div>

<!-- 加站點對話框 -->
<div class="modal-bg" id="stationModal">
  <div class="modal">
    <h2>加入站點</h2>
    <label>搜尋站點（站名、地址、行政區）</label>
    <input type="text" id="stationSearchInput" placeholder="輸入關鍵字，例：淡水、漁人碼頭、八里…">
    <div class="search-results" id="stationResults">
      <div class="empty">先輸入關鍵字搜尋</div>
    </div>
    <div class="modal-actions">
      <button class="ghost" data-modal-close>關閉</button>
    </div>
  </div>
</div>

<script>
// =========================================================
//  YouBike 資料來源
//   - 新北：透過你架的 Cloudflare Worker 代理（API 不支援 CORS）
//   - 台北：政府官方 API（有支援 CORS，可以直接打）
//  欄位幾乎一致，合併進同一個 stationMap，用 sno 為 key。
//  為了避免兩市可能撞 sno，會在 key 前面加上「TPE-」/「NTPC-」前綴。
// =========================================================
const SOURCES = [
  {
    city: "新北市",
    prefix: "NTPC-",
    url: "https://green-boat-a984.hippop3c.workers.dev/",
  },
  {
    city: "臺北市",
    prefix: "TPE-",
    url: "https://tcgbusfs.blob.core.windows.net/dotapp/youbike/v2/youbike_immediate.json",
  },
];

// =========================================================
//  雲端共用設定（JSONBin.io）
//  所有人讀同一個 bin，任何人改了會立刻寫回，下次別人重整就看到。
//
//  ▼ 把這兩個值換成你自己 JSONBin 的：
// =========================================================
const JSONBIN_BIN_ID  = "6a432d8eda38895dfe1381e8";
const JSONBIN_API_KEY = "$2a$10$rqIrO1srIdLmqpfkgHbnj.92O/KwdH0aeS/4anhHjZrWpVjFU9nue";

const JSONBIN_READ_URL  = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`;
const JSONBIN_WRITE_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;

const STORAGE_KEY = "ntpc_youbike_projects_cache";  // 只當離線快取用

const DEFAULT_PROJECTS = [
  { id: "p1", name: "專案 1", stationIds: [] },
];

async function loadProjectsFromCloud() {
  if (!JSONBIN_BIN_ID || JSONBIN_BIN_ID === "YOUR_BIN_ID_HERE") {
    console.warn("尚未設定 JSONBIN_BIN_ID，使用預設值");
    return JSON.parse(JSON.stringify(DEFAULT_PROJECTS));
  }
  try {
    const res = await fetch(JSONBIN_READ_URL, {
      headers: { "X-Master-Key": JSONBIN_API_KEY },
      cache: "no-store",
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const json = await res.json();
    const data = json.record || json;
    const arr = Array.isArray(data) ? data : (Array.isArray(data.projects) ? data.projects : null);
    if (arr) {
      // 同步存一份到 localStorage 當離線備援
      localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
      return arr;
    }
    throw new Error("格式錯誤");
  } catch (err) {
    console.warn("雲端讀取失敗，改用本地快取：", err);
    // 離線備援
    try {
      const cached = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (Array.isArray(cached) && cached.length > 0) return cached;
    } catch {}
    return JSON.parse(JSON.stringify(DEFAULT_PROJECTS));
  }
}

let saveTimer = null;
let saveInFlight = false;
async function saveProjectsToCloud() {
  // 先存本地快取
  localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));

  // 用 debounce 避免短時間連續存
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    if (saveInFlight) return;
    saveInFlight = true;
    setSyncStatus("syncing", "同步中…");
    try {
      const res = await fetch(JSONBIN_WRITE_URL, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "X-Master-Key": JSONBIN_API_KEY,
        },
        body: JSON.stringify({ projects }),
      });
      if (!res.ok) throw new Error("HTTP " + res.status);
      setSyncStatus("ok", "✓ 已同步到雲端");
      setTimeout(() => setSyncStatus("", ""), 2200);
    } catch (err) {
      console.error("雲端寫入失敗：", err);
      setSyncStatus("warn", "⚠ 同步失敗（已保存本地）：" + err.message);
    } finally {
      saveInFlight = false;
    }
  }, 400);
}

// 保留同名函式，舊程式碼呼叫 saveProjects() 時自動同步雲端
function saveProjects() { saveProjectsToCloud(); }

function setSyncStatus(cls, text) {
  const el = document.getElementById("syncStatus");
  if (!el) return;
  el.className = "sync " + (cls || "");
  el.textContent = text || "";
}

function genId() { return "p" + Date.now().toString(36) + Math.random().toString(36).slice(2,5); }

let projects = [];      // 由 init() 載入
let allStations = [];   // 從 API 抓的全部站點
let stationMap = {};    // sno -> station object

// =========================================================
//  抓資料 & 合併（雙北 + 同站的 2.0 / 2.0E）
// =========================================================
async function fetchYouBike() {
  const status = document.getElementById("status");
  status.className = "status";
  status.textContent = "更新中…";

  const merged = {};
  const errors = [];

  // 並行抓兩個來源
  await Promise.all(SOURCES.map(async src => {
    try {
      const res = await fetch(src.url, { cache: "no-store" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const raw = await res.json();
      if (!Array.isArray(raw)) throw new Error("格式錯誤");
      raw.forEach(d => {
        const sno = d.sno;
        if (!sno) return;
        const key = src.prefix + sno;
        const sna = (d.sna || "").replace(/^YouBike2\.0_?/, "");
        if (!merged[key]) {
          merged[key] = {
            sno: key,                 // 帶前綴的唯一 ID
            rawSno: sno,
            city: src.city,
            sna,
            sarea: d.sarea || "",
            ar: d.ar || "",
            sbi: 0, bemp: 0, tot: 0,
            mday: "",
          };
        }
        merged[key].sbi  += Number(d.sbi  || 0);
        merged[key].bemp = Math.max(merged[key].bemp, Number(d.bemp || 0));
        merged[key].tot  = Math.max(merged[key].tot,  Number(d.tot  || 0));
        const t = d.mday || d.srcUpdateTime || "";
        if (t > merged[key].mday) merged[key].mday = t;
      });
    } catch (err) {
      console.error(src.city + " 抓取失敗：", err);
      errors.push(`${src.city}: ${err.message}`);
    }
  }));

  allStations = Object.values(merged);
  stationMap = merged;

  // 一次性升級舊資料：把專案裡的純 sno（沒前綴）換成帶前綴的版本
  migrateOldStationIds();

  if (allStations.length === 0) {
    status.className = "status warn";
    status.textContent = "全部資料來源失敗：" + errors.join(" / ");
  } else if (errors.length > 0) {
    status.className = "status warn";
    status.textContent = "部分失敗（" + errors.join(" / ") + "）・共 " + allStations.length + " 站";
  } else {
    status.className = "status ok";
    status.textContent = "已更新 " + new Date().toLocaleTimeString("zh-TW", { hour12: false }) +
                        " ・ 共 " + allStations.length + " 站";
  }
  renderAll();
  return allStations.length > 0;
}

// =========================================================
//  舊資料升級：把純 sno 換成帶前綴版（NTPC- / TPE-）
// =========================================================
function migrateOldStationIds() {
  if (projects.length === 0 || allStations.length === 0) return;
  let changed = false;
  projects.forEach(p => {
    p.stationIds = p.stationIds.map(id => {
      if (stationMap[id]) return id;                     // 已是新格式
      if (stationMap["NTPC-" + id]) { changed = true; return "NTPC-" + id; }
      if (stationMap["TPE-"  + id]) { changed = true; return "TPE-"  + id; }
      return id;
    });
  });
  if (changed) {
    console.log("已自動升級舊格式站點 ID");
    saveProjectsToCloud();
  }
}

function formatMday(s) {
  if (!s) return "";
  if (/^\d{14}$/.test(s)) {
    return s.slice(4,6) + "/" + s.slice(6,8) + " " + s.slice(8,10) + ":" + s.slice(10,12);
  }
  const d = new Date(s);
  if (!isNaN(d)) {
    return (d.getMonth()+1).toString().padStart(2,"0") + "/" +
           d.getDate().toString().padStart(2,"0") + " " +
           d.getHours().toString().padStart(2,"0") + ":" +
           d.getMinutes().toString().padStart(2,"0");
  }
  return s;
}

// =========================================================
//  渲染：主清單
// =========================================================
function renderAll() {
  const wrap = document.getElementById("projects");
  wrap.innerHTML = "";

  if (projects.length === 0) {
    wrap.innerHTML = '<div class="empty-card">目前沒有專案。點上方「＋ 新增專案」開始。</div>';
    return;
  }

  projects.forEach(p => {
    wrap.appendChild(renderProject(p));
  });
}

function renderProject(p) {
  const div = document.createElement("div");
  div.className = "project";
  div.dataset.projectId = p.id;

  // 取出該專案的站點資料
  //  向後相容：舊資料可能存的是純 sno（沒有 NTPC-/TPE- 前綴），
  //  先用原 ID 找，找不到的話依序加上前綴再找一次。
  const stations = p.stationIds.map(savedId => {
    let s = stationMap[savedId];
    if (!s) s = stationMap["NTPC-" + savedId];
    if (!s) s = stationMap["TPE-" + savedId];
    return s || { sno: savedId, sna: "(載入中…)", sbi: "--", bemp: "--", tot: 0, mday: "" };
  });

  // 複製用文字
  const copyLines = stations.map(s => `${s.sna} 在站${s.sbi} 空位${s.bemp}`).join("\n");
  const copyTextSafe = copyLines || "（此專案尚無站點）";

  div.innerHTML = `
    <div class="project-header">
      <div class="project-title">${escapeHtml(p.name)}</div>
      <div class="project-tools">
        <button class="ghost icon-only" data-action="add-station">＋ 加站點</button>
        <button class="ghost icon-only" data-action="rename">✏ 改名</button>
        <button class="danger icon-only" data-action="delete">刪除</button>
      </div>
    </div>

    <div class="copybox">
      <div class="copytext" data-copytext>${escapeHtml(copyTextSafe)}</div>
      <button class="copy-btn" data-action="copy">📋 複製</button>
    </div>

    <div class="stations" data-stations></div>
  `;

  // 站點卡片
  const stationsWrap = div.querySelector("[data-stations]");
  if (stations.length === 0) {
    stationsWrap.innerHTML = '<div class="empty-card">尚未加入站點，點右上「＋ 加站點」加入。</div>';
  } else {
    stations.forEach(s => stationsWrap.appendChild(renderStationCard(s, p.id)));
  }

  // 事件
  div.querySelector('[data-action="add-station"]').onclick = () => openStationModal(p.id);
  div.querySelector('[data-action="rename"]').onclick = () => openProjectModal(p);
  div.querySelector('[data-action="delete"]').onclick = () => deleteProject(p.id);
  div.querySelector('[data-action="copy"]').onclick = (e) => copyText(copyLines, e.target);

  return div;
}

function renderStationCard(s, projectId) {
  const card = document.createElement("div");
  card.className = "card";
  const tot = (typeof s.tot === "number" && s.tot > 0) ? s.tot
              : (Number(s.sbi)||0) + (Number(s.bemp)||0);
  const pct = (tot > 0 && typeof s.sbi === "number") ? Math.round((s.sbi / tot) * 100) : 0;

  card.innerHTML = `
    <button class="remove-btn" title="從專案移除">✕</button>
    <h3>${escapeHtml(s.sna || "(未知)")}</h3>
    <div class="nums">
      <div class="num"><span class="v">${s.sbi}</span><span class="l">車輛數</span></div>
      <div class="num empty"><span class="v">${s.bemp}</span><span class="l">空位數</span></div>
    </div>
    <div class="bar"><span style="width:${pct}%"></span></div>
    <div class="meta"><span>總車格 ${tot || "--"}</span><span>${formatMday(s.mday)}</span></div>
  `;
  card.querySelector(".remove-btn").onclick = () => removeStationFromProject(projectId, s.sno);
  return card;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])
  );
}

// =========================================================
//  複製
// =========================================================
async function copyText(text, btn) {
  if (!text) return;
  try {
    await navigator.clipboard.writeText(text);
    const old = btn.textContent;
    btn.textContent = "✓ 已複製";
    btn.classList.add("copied");
    setTimeout(() => {
      btn.textContent = old;
      btn.classList.remove("copied");
    }, 1800);
  } catch {
    alert("複製失敗，請手動圈選文字");
  }
}

// =========================================================
//  專案操作
// =========================================================
let editingProjectId = null;

function openProjectModal(project) {
  editingProjectId = project ? project.id : null;
  document.getElementById("projectModalTitle").textContent = project ? "重新命名專案" : "新增專案";
  document.getElementById("projectNameInput").value = project ? project.name : "";
  document.getElementById("projectModal").classList.add("open");
  setTimeout(() => document.getElementById("projectNameInput").focus(), 50);
}

function saveProject() {
  const name = document.getElementById("projectNameInput").value.trim();
  if (!name) { alert("請輸入專案名稱"); return; }
  if (editingProjectId) {
    const p = projects.find(p => p.id === editingProjectId);
    if (p) p.name = name;
  } else {
    projects.push({ id: genId(), name, stationIds: [] });
  }
  saveProjects();
  renderAll();
  closeAllModals();
}

function deleteProject(id) {
  const p = projects.find(p => p.id === id);
  if (!p) return;
  if (!confirm(`確定要刪除專案「${p.name}」嗎？`)) return;
  projects = projects.filter(p => p.id !== id);
  saveProjects();
  renderAll();
}

// =========================================================
//  加 / 移除 站點
// =========================================================
let currentProjectIdForAdd = null;

function openStationModal(projectId) {
  if (allStations.length === 0) {
    alert("資料還在載入，請稍候再試");
    return;
  }
  currentProjectIdForAdd = projectId;
  document.getElementById("stationSearchInput").value = "";
  document.getElementById("stationResults").innerHTML = '<div class="empty">先輸入關鍵字搜尋</div>';
  document.getElementById("stationModal").classList.add("open");
  setTimeout(() => document.getElementById("stationSearchInput").focus(), 50);
}

function searchStations(kw) {
  const results = document.getElementById("stationResults");
  kw = kw.trim().toLowerCase();
  if (!kw) {
    results.innerHTML = '<div class="empty">先輸入關鍵字搜尋</div>';
    return;
  }
  const project = projects.find(p => p.id === currentProjectIdForAdd);
  const alreadyIn = new Set(project ? project.stationIds : []);

  const hits = allStations.filter(s => {
    if (alreadyIn.has(s.sno)) return false;
    return (s.sna + " " + s.ar + " " + s.sarea + " " + (s.city || "")).toLowerCase().includes(kw);
  }).slice(0, 30);

  if (hits.length === 0) {
    results.innerHTML = '<div class="empty">找不到相符站點</div>';
    return;
  }
  results.innerHTML = hits.map(s => `
    <div class="item" data-sno="${s.sno}">
      <div class="name">${escapeHtml(s.sna)} <span style="color:var(--accent);font-size:11px;">[${escapeHtml(s.city || "")}]</span> <span style="color:var(--ink-dim);font-size:11px;">(${escapeHtml(s.sarea)})</span></div>
      <div class="addr">${escapeHtml(s.ar)}</div>
    </div>
  `).join("");
  results.querySelectorAll(".item").forEach(item => {
    item.onclick = () => addStationToProject(currentProjectIdForAdd, item.dataset.sno);
  });
}

function addStationToProject(projectId, sno) {
  const p = projects.find(p => p.id === projectId);
  if (!p) return;
  if (p.stationIds.includes(sno)) return;
  p.stationIds.push(sno);
  saveProjects();
  renderAll();
  // 重新搜尋（更新已加入清單）
  searchStations(document.getElementById("stationSearchInput").value);
}

function removeStationFromProject(projectId, sno) {
  const p = projects.find(p => p.id === projectId);
  if (!p) return;
  p.stationIds = p.stationIds.filter(id => id !== sno);
  saveProjects();
  renderAll();
}

// =========================================================
//  對話框關閉
// =========================================================
function closeAllModals() {
  document.querySelectorAll(".modal-bg").forEach(m => m.classList.remove("open"));
}
document.querySelectorAll("[data-modal-close]").forEach(btn => btn.onclick = closeAllModals);
document.querySelectorAll(".modal-bg").forEach(m => {
  m.addEventListener("click", e => { if (e.target === m) closeAllModals(); });
});
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeAllModals();
});

// =========================================================
//  時鐘與整點排程
// =========================================================
function tickClock() {
  const now = new Date();
  document.getElementById("clockNow").textContent =
    now.toLocaleTimeString("zh-TW", { hour12: false });
  const next = new Date(now);
  next.setHours(now.getHours() + 1, 0, 0, 0);
  document.getElementById("clockNext").textContent =
    "下次更新：" + next.getHours().toString().padStart(2,"0") + ":00";
}
setInterval(tickClock, 1000);
tickClock();

function scheduleHourly() {
  const now = new Date();
  const next = new Date(now);
  next.setHours(now.getHours() + 1, 0, 5, 0);
  const wait = next - now;
  setTimeout(async () => {
    await fetchYouBike();
    setInterval(fetchYouBike, 60 * 60 * 1000);
  }, wait);
}

// =========================================================
//  事件綁定 & 啟動
// =========================================================
document.getElementById("addProjectBtn").onclick = () => openProjectModal(null);
document.getElementById("refreshBtn").onclick = fetchYouBike;
document.getElementById("reloadProjectsBtn").onclick = async () => {
  setSyncStatus("syncing", "重新載入中…");
  projects = await loadProjectsFromCloud();
  setSyncStatus("ok", "✓ 已載入雲端最新設定");
  setTimeout(() => setSyncStatus("", ""), 2200);
  renderAll();
};
document.getElementById("projectSaveBtn").onclick = saveProject;
document.getElementById("stationSearchInput").addEventListener("input", e => searchStations(e.target.value));
document.getElementById("projectNameInput").addEventListener("keydown", e => {
  if (e.key === "Enter") saveProject();
});

(async function init() {
  projects = await loadProjectsFromCloud();
  renderAll();
  fetchYouBike();
  scheduleHourly();
})();
</script>
</body>
</html>
